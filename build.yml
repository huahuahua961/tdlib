      - name: Setup vcpkg
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          call vcpkg\bootstrap-vcpkg.bat
          vcpkg\vcpkg install openssl:x64-windows zlib:x64-windows

      - name: Install gperf
        shell: cmd
        run: |
          choco install gperf -y

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake -A x64 -DCMAKE_TOOLCHAIN_FILE=%CD%\..\vcpkg\scripts\buildsystems\vcpkg.cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build tdjson
        shell: cmd
        run: |
          cd build
          cmake --build . --target tdjson --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdjson-windows-x64
          path: |
            build/Release/tdjson.dll
            vcpkg/installed/x64-windows/bin/*.dll
