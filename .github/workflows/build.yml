name: Build TDLib Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: master

      - name: Apply patch to AuthManager.cpp
        shell: python
        run: |
          with open("td/telegram/AuthManager.cpp", "r", encoding="utf-8") as f:
              content = f.read()

          # Patch 1: intercept RECAPTCHA_CHECK in on_result
          old1 = (
              "          on_current_query_error(net_query->move_as_error());\n"
              "          return;\n"
              "        }\n"
              "        if (type != NetQueryType::RequestQrCode && type != NetQueryType::ImportQrCode &&\n"
              "            type != NetQueryType::GetPassword && type != NetQueryType::FinishPasskeyLogin) {"
          )
          new1 = (
              "          auto error = net_query->move_as_error();\n"
              "          if (type == NetQueryType::SendCode && error.message().str().rfind(\"RECAPTCHA_CHECK_\", 0) == 0) {\n"
              "            auto msg = error.message().str();\n"
              "            auto sep = msg.find(\"__\");\n"
              "            std::string action = (sep != std::string::npos) ? msg.substr(16, sep - 16) : msg.substr(16);\n"
              "            std::string key_id = (sep != std::string::npos) ? msg.substr(sep + 2) : \"\";\n"
              "            int64 vid = ++recaptcha_verification_id_;\n"
              "            query_id_ = 0;\n"
              "            net_query_id_ = 0;\n"
              "            net_query_type_ = NetQueryType::None;\n"
              "            send_closure(G()->td(), &Td::send_update,\n"
              "              td_api::make_object<td_api::updateApplicationRecaptchaVerificationRequired>(vid, action, key_id));\n"
              "            return;\n"
              "          }\n"
              "          on_current_query_error(std::move(error));\n"
              "          return;\n"
              "        }\n"
              "        if (type != NetQueryType::RequestQrCode && type != NetQueryType::ImportQrCode &&\n"
              "            type != NetQueryType::GetPassword && type != NetQueryType::FinishPasskeyLogin) {"
          )

          # Patch 2: handle setApplicationVerificationToken for recaptcha
          old2 = (
              "void AuthManager::on_send_code_result(NetQueryPtr &&net_query) {\n"
              "  auto r_sent_code = fetch_result<telegram_api::auth_sendCode>(std::move(net_query));\n"
              "  if (r_sent_code.is_error()) {\n"
              "    return on_current_query_error(r_sent_code.move_as_error());\n"
              "  }\n"
              "  on_sent_code(r_sent_code.move_as_ok());\n"
              "}"
          )
          new2 = (
              "void AuthManager::set_recaptcha_verification_token(uint64 query_id, int64 verification_id, string token, Promise<Unit> promise) {\n"
              "  if (verification_id != recaptcha_verification_id_ || recaptcha_verification_id_ == 0) {\n"
              "    return promise.set_error(Status::Error(400, \"Wrong verification_id\"));\n"
              "  }\n"
              "  on_new_query(query_id);\n"
              "  start_net_query(NetQueryType::SendCode,\n"
              "    G()->net_query_creator().create_unauth(\n"
              "      telegram_api::invokeWithReCaptcha(\n"
              "        std::move(token),\n"
              "        send_code_helper_.send_code(\n"
              "          send_code_helper_.get_phone_number(),\n"
              "          nullptr,\n"
              "          api_id_, api_hash_\n"
              "        )\n"
              "      )\n"
              "    )\n"
              "  );\n"
              "  promise.set_value(Unit());\n"
              "}\n"
              "void AuthManager::on_send_code_result(NetQueryPtr &&net_query) {\n"
              "  auto r_sent_code = fetch_result<telegram_api::auth_sendCode>(std::move(net_query));\n"
              "  if (r_sent_code.is_error()) {\n"
              "    return on_current_query_error(r_sent_code.move_as_error());\n"
              "  }\n"
              "  on_sent_code(r_sent_code.move_as_ok());\n"
              "}"
          )

          if old1 in content:
              content = content.replace(old1, new1)
              print("Patch 1 applied OK")
          else:
              idx = content.find("on_current_query_error(net_query->move_as_error())")
              print(repr(content[max(0,idx-200):idx+200]))
              raise Exception("Patch 1 failed")

          if old2 in content:
              content = content.replace(old2, new2)
              print("Patch 2 applied OK")
          else:
              raise Exception("Patch 2 failed")

          with open("td/telegram/AuthManager.cpp", "w", encoding="utf-8") as f:
              f.write(content)

      - name: Apply patch to AuthManager.h
        shell: python
        run: |
          with open("td/telegram/AuthManager.h", "r", encoding="utf-8") as f:
              content = f.read()

          old = "  void on_send_code_result(NetQueryPtr &&net_query);"
          new = (
              "  void on_send_code_result(NetQueryPtr &&net_query);\n"
              "  void set_recaptcha_verification_token(uint64 query_id, int64 verification_id, string token, Promise<Unit> promise);\n"
              "  int64 recaptcha_verification_id_ = 0;"
          )
          if old in content:
              content = content.replace(old, new)
              with open("td/telegram/AuthManager.h", "w", encoding="utf-8") as f:
                  f.write(content)
              print("AuthManager.h patched OK")
          else:
              raise Exception("Target not found in AuthManager.h")

      - name: Apply patch to Requests.cpp for setApplicationVerificationToken
        shell: python
        run: |
          with open("td/telegram/Requests.cpp", "r", encoding="utf-8") as f:
              content = f.read()

          old = (
              "void Requests::on_request(uint64 id, td_api::setApplicationVerificationToken &request) {\n"
              "  CHECK_IS_USER();\n"
              "  CLEAN_INPUT_STRING(request.token_);\n"
              "  CREATE_OK_REQUEST_PROMISE();\n"
              "  G()->net_query_dispatcher().set_verification_token(request.verification_id_, std::move(request.token_),\n"
              "                                                     std::move(promise));\n"
              "}"
          )
          new = (
              "void Requests::on_request(uint64 id, td_api::setApplicationVerificationToken &request) {\n"
              "  CHECK_IS_USER();\n"
              "  CLEAN_INPUT_STRING(request.token_);\n"
              "  CREATE_OK_REQUEST_PROMISE();\n"
              "  send_closure(td_->auth_manager_actor_, &AuthManager::set_recaptcha_verification_token,\n"
              "    id, request.verification_id_, std::move(request.token_), std::move(promise));\n"
              "}"
          )
          if old in content:
              content = content.replace(old, new)
              with open("td/telegram/Requests.cpp", "w", encoding="utf-8") as f:
                  f.write(content)
              print("Requests.cpp patched OK")
          else:
              idx = content.find("setApplicationVerificationToken")
              print(repr(content[max(0,idx-50):idx+400]))
              raise Exception("Requests.cpp patch failed")

      - name: Setup vcpkg and dependencies
        shell: cmd
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          call vcpkg\bootstrap-vcpkg.bat
          vcpkg\vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows

      - name: Add gperf to PATH and Configure CMake
        shell: cmd
        run: |
          set PATH=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows\tools\gperf;%PATH%
          mkdir build
          cd build
          cmake -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=D:\a\tdlib\tdlib\vcpkg\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DGPERF_EXECUTABLE=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows\tools\gperf\gperf.exe ^
            -DZLIB_LIBRARY=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows\lib\zlib.lib ^
            -DZLIB_INCLUDE_DIR=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows\include ^
            -DOPENSSL_ROOT_DIR=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows ^
            -DCMAKE_BUILD_TYPE=Release ^
            ..

      - name: Build tdjson
        shell: cmd
        run: |
          set PATH=D:\a\tdlib\tdlib\vcpkg\installed\x64-windows\tools\gperf;%PATH%
          cmake --build build --target tdjson --config Release

      - name: Collect DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output
          Copy-Item build\Release\tdjson.dll output\
          Copy-Item vcpkg\installed\x64-windows\bin\*.dll output\ -ErrorAction SilentlyContinue
          Get-ChildItem output\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdjson-windows-x64
          path: output\
